name: Module 2 CI

on:
  workflow_dispatch: # change to push when ready
    branches:
      - module2
    paths-ignore:
      - README.md

jobs:
  test-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start server in background
        run: |
          npm start &
          sleep 5

      - name: Server check
        run: curl -f http://localhost:3000/health

      - name: Check CSS path reachable
        run: curl -f http://localhost:3000/css/style.css
